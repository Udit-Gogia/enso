# App
spring.application.name=enso-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/enso?options=-c%20timezone%3DUTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TimeZone='UTC'

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=enso-secret-key-that-is-long-enough-for-hmac-sha-256-algorithm
jwt.expiration=86400000
jwt.setup-expiration=900000

# Server
server.port=8080